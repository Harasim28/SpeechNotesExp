  <path d="M 38 70 A 48 48 0 0 0 38 100" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 134 70 A 48 48 0 0 1 134 100" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Note lines -->
